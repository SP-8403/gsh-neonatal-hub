<!DOCTYPE html>
<html>
<head>
  <title>Presentation Setup – Mac</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2d3d;
    }

    header {
      background: #1F3A5F;
      color: white;
      padding: 20px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 24px 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .desc {
      font-size: 14px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.4;
    }

    .button {
      display: block;
      background: #2E86C1;
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      margin-top: 18px;
      transition: 0.2s ease;
    }

    .button:hover {
      background: #1F3A5F;
    }

    .note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 12px;
    }

  </style>
</head>

<body>

<header>
Presentation Setup – Mac
</header>

<div class="container">

  <div class="card">

    <h2>Presentation Setup</h2>

    <p class="desc">
    Access the full guide for wireless display configuration and Presenter View setup.
    </p>

    <a href="https://www.canva.com/design/DAHES_bMVRo/jQYl0E1DSUxHSAgWbUm0yQ/view"
       target="_blank"
       class="button">
       Open Setup Guide
    </a>

    <p class="note">
    Ensure Extended Display is enabled before starting.
    </p>

  </div>

</div>

</body>
</html>
